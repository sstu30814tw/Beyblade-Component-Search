name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build site
        env:
          PORT: "5173"
          BASE_PATH: "/Beyblade-Component-Search/"
          NODE_ENV: production
        run: pnpm --filter @workspace/beyblade-x run build

      - name: Add SPA 404 fallback
        run: cp artifacts/beyblade-x/dist/public/index.html artifacts/beyblade-x/dist/public/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/beyblade-x/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
